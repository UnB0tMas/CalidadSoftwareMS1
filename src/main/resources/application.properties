# =========================================================
# APP LOCAL
# =========================================================
spring.application.name=ms1
server.port=8080

# =========================================================
# SQL SERVER LOCAL
# Cambia username/password segun tu SQL Server local.
# =========================================================
spring.datasource.url=jdbc:sqlserver://192.168.18.7:1433;databaseName=bd_ms1;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=admin
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# =========================================================
# FLYWAY LOCAL
# Localmente apagado para no bloquear el arranque
# si aun no tienes migraciones SQL completas.
# =========================================================
spring.flyway.enabled=false

# =========================================================
# APP PROPERTIES
# Coincide con AppPropertiesConfig.java
# =========================================================
app.name=MS Seguridad Usuarios
app.version=1.0.0
app.description=Microservicio local de seguridad, usuarios, JWT, OAuth2, correo, sesiones y auditoria.
app.frontend-url=http://localhost:4200
app.gateway-url=http://localhost:8080
app.zone-id=UTC

# =========================================================
# APP SECURITY
# Coincide con AppPropertiesConfig.Security
# =========================================================
app.security.access-token-minutes=15
app.security.refresh-token-days=7
app.security.jwt-clock-skew-seconds=60
app.security.password-change-code-minutes=10
app.security.password-reset-token-minutes=15
app.security.verification-max-attempts=5
app.security.verification-code-cooldown-seconds=60
app.security.max-login-attempts=5
app.security.lock-minutes=15

# =========================================================
# JWT LOCAL - RSA CON OPENSSL
# Coincide con JwtProperties.java y JwtKeyConfig.java
# Archivos requeridos:
# src/main/resources/keys/private_key.pem
# src/main/resources/keys/public_key.pem
# =========================================================
security.jwt.issuer=http://localhost:8080
security.jwt.audiences[0]=ms1
security.jwt.audiences[1]=api-gateway
security.jwt.access-token-minutes=15
security.jwt.clock-skew-seconds=60
security.jwt.key-id=ms1-local-rsa-key
security.jwt.public-key-location=classpath:keys/public_key.pem
security.jwt.private-key-location=classpath:keys/private_key.pem
security.jwt.jws-algorithm=RS256
security.jwt.roles-claim=roles
security.jwt.authorities-claim=authorities
security.jwt.role-claim=rol
security.jwt.session-id-claim=sid
security.jwt.token-type-claim=typ
security.jwt.access-token-type=access

# =========================================================
# AUTHORIZATION SERVER LOCAL
# Necesario para que Spring Boot cree RegisteredClientRepository.
# Esto es para pruebas locales de OAuth2 Authorization Server.
# =========================================================
spring.security.oauth2.authorizationserver.client.angular-client.registration.client-id=angular-client
spring.security.oauth2.authorizationserver.client.angular-client.registration.client-secret={noop}angular-secret
spring.security.oauth2.authorizationserver.client.angular-client.registration.client-authentication-methods=client_secret_basic,client_secret_post
spring.security.oauth2.authorizationserver.client.angular-client.registration.authorization-grant-types=authorization_code,refresh_token,client_credentials
spring.security.oauth2.authorizationserver.client.angular-client.registration.redirect-uris=http://localhost:4200/auth/callback,http://127.0.0.1:4200/auth/callback
spring.security.oauth2.authorizationserver.client.angular-client.registration.post-logout-redirect-uris=http://localhost:4200
spring.security.oauth2.authorizationserver.client.angular-client.registration.scopes=openid,profile,email
spring.security.oauth2.authorizationserver.client.angular-client.require-authorization-consent=false

# =========================================================
# OAUTH2 LOGIN LOCAL - GOOGLE
# IMPORTANTE:
# Si no usaras login con Google todavia, deja estos valores dummy.
# No hagas clic en /oauth2/authorization/google hasta poner credenciales reales.
# =========================================================
spring.security.oauth2.client.registration.google.client-id=TU_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TU_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google

# =========================================================
# CORS LOCAL - ANGULAR
# Coincide con CorsConfig.java y AppPropertiesConfig.Cors
# =========================================================
app.cors.allowed-origins[0]=http://localhost:4200
app.cors.allowed-origins[1]=http://127.0.0.1:4200
app.cors.allowed-methods[0]=GET
app.cors.allowed-methods[1]=POST
app.cors.allowed-methods[2]=PUT
app.cors.allowed-methods[3]=PATCH
app.cors.allowed-methods[4]=DELETE
app.cors.allowed-methods[5]=OPTIONS
app.cors.allowed-headers[0]=Authorization
app.cors.allowed-headers[1]=Content-Type
app.cors.allowed-headers[2]=Accept
app.cors.allowed-headers[3]=Origin
app.cors.allowed-headers[4]=X-Requested-With
app.cors.allowed-headers[5]=X-Request-Id
app.cors.allowed-headers[6]=X-Correlation-Id
app.cors.exposed-headers[0]=Authorization
app.cors.exposed-headers[1]=X-Request-Id
app.cors.exposed-headers[2]=X-Correlation-Id
app.cors.allow-credentials=false
app.cors.max-age-seconds=3600
app.cors.path-pattern=/**

# =========================================================
# CACHE LOCAL
# Coincide con AppPropertiesConfig.Cache y CacheConfig.java
# =========================================================
app.cache.names[0]=verification-code-cooldown
app.cache.names[1]=password-reset-cooldown
app.cache.names[2]=login-attempts
app.cache.names[3]=oauth2-state
app.cache.names[4]=user-security-context
app.cache.expire-after-write-minutes=10
app.cache.maximum-size=10000
app.cache.record-stats=true
app.cache.allow-null-values=false

# =========================================================
# MAIL LOCAL
# Para Gmail debes usar password de aplicacion, no tu password normal.
# Si no probaras correos aun, puedes dejar app.mail.enabled=false.
# =========================================================
app.mail.enabled=false
app.mail.from=TU_CORREO@gmail.com
app.mail.sender-name=MS Seguridad Usuarios
app.mail.support-email=TU_CORREO@gmail.com

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO@gmail.com
spring.mail.password=TU_PASSWORD_DE_APLICACION
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
spring.mail.properties.mail.debug=false

# =========================================================
# OPENAPI / SWAGGER LOCAL
# Coincide con OpenApiConfig.java
# =========================================================
app.open-api.title=MS Seguridad Usuarios API
app.open-api.description=API local del microservicio de seguridad, usuarios, autenticacion, JWT, OAuth2, sesiones y auditoria.
app.open-api.contact-name=Equipo MS1
app.open-api.contact-email=TU_CORREO@gmail.com
app.open-api.contact-url=http://localhost:4200

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =========================================================
# JPA AUDIT
# Coincide con JpaAuditingConfig.java y AppPropertiesConfig.Jpa
# =========================================================
app.jpa.system-auditor=SYSTEM
app.jpa.auditor-max-length=120

# =========================================================
# ACTUATOR LOCAL
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================================================
# LOGGING LOCAL
# =========================================================
logging.level.root=INFO
logging.level.com.upsjb.ms1=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE